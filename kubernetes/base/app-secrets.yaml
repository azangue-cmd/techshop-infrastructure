# =====================================================
# Secret - Données sensibles (JWT, mots de passe, etc)
# =====================================================
# Les valeurs doivent être encodées en base64
# Commandes pour encoder: echo -n "valeur" | base64
# echo -n "techshop-secret-key" | base64 → dGVjaHNob3Atc2VjcmV0LWtleQ==
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: techshop
type: Opaque
data:
  # JWT Secret pour authentification (base64 encoded)
  JWT_SECRET: dGVjaHNob3Atc2VjcmV0LWtleQ==
  
  # RabbitMQ credentials
  RABBITMQ_USER: Z3Vlc3Q=  # guest
  RABBITMQ_PASSWORD: Z3Vlc3Q=  # guest
  
  # Redis password (si nécessaire)
  REDIS_PASSWORD: ""
