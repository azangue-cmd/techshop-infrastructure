version: "3.9"

services:
  # =====================================================
  # 🗄️ DATABASE - PostgreSQL
  # =====================================================
  database:
    # 🔨 Build l'image depuis notre Dockerfile personnalisé
    build:
      # Racine du projet
      context: .
      dockerfile: docker/database/Dockerfile
    # Nom de l'image locale
    image: techshop-database:latest
    # Nom fixe du container
    container_name: techshop-database

    # 🌍 Variables d’environnement PostgreSQL
    environment:
      POSTGRES_DB: techshop
      POSTGRES_USER: techshop
      POSTGRES_PASSWORD: techshop

    # 🔌 Expose le port 5432 vers la machine locale
    ports:
      - "5432:5432"

    # 🌐 Connexion au réseau interne Docker
    networks:
      - techshop-network

    # 💾 Volume pour persister les données PostgreSQL
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # =====================================================
  # 👤 USER SERVICE (Python / FastAPI)
  # =====================================================
  user-service:
    build:
      context: .
      dockerfile: docker/user-service/Dockerfile

    image: aduzeus/user-service:latest
    container_name: techshop-user-service

    # ⏳ Attendre que la base démarre avant
    depends_on:
      - database

    # 🔗 URL de connexion à PostgreSQL
    environment:
      DATABASE_URL: postgresql://techshop:techshop@database:5432/techshop

    ports:
      - "8001:8001"

    networks:
      - techshop-network

  # =====================================================
  # 📦 PRODUCT SERVICE (Java / Spring Boot)
  # =====================================================
  product-service:
    build:
      context: .
      dockerfile: docker/product-service/Dockerfile

    image: aduzeus/product-service:latest
    container_name: techshop-product-service

    depends_on:
      - database

    # 🔗 Configuration Spring Boot pour PostgreSQL
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://database:5432/techshop
      SPRING_DATASOURCE_USERNAME: techshop
      SPRING_DATASOURCE_PASSWORD: techshop

    ports:
      - "8002:8002"

    networks:
      - techshop-network

  # =====================================================
  # 🧾 ORDER SERVICE (Go)
  # =====================================================
  order-service:
    build:
      context: .
      dockerfile: docker/order-service/Dockerfile

    image: aduzeus/order-service:latest
    container_name: techshop-order-service

    depends_on:
      - database

    # 🔗 Connexion PostgreSQL pour service Go
    environment:
      DATABASE_URL: postgres://techshop:techshop@database:5432/techshop?sslmode=disable

    ports:
      - "8003:8003"

    networks:
      - techshop-network

  # =====================================================
  # 🌉 API GATEWAY (Node.js)
  # =====================================================
  api-gateway:
    build:
      context: .
      dockerfile: docker/api-gateway/Dockerfile

    image: aduzeus/api-gateway:latest
    container_name: techshop-api-gateway

    # ⏳ Attendre les microservices
    depends_on:
      - user-service
      - product-service
      - order-service

    # 🔗 URLs internes des microservices
    environment:
      USER_SERVICE_URL: ${USER_SERVICE_URL}
      PRODUCT_SERVICE_URL: ${PRODUCT_SERVICE_URL}
      ORDER_SERVICE_URL: ${ORDER_SERVICE_URL}

    ports:
      - "3000:3000"

    networks:
      - techshop-network

  # =====================================================
  # 🖥️ FRONTEND (React + Nginx)
  # =====================================================
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile

    image: aduzeus/frontend:latest
    container_name: techshop-frontend

    depends_on:
      - api-gateway

    # 🌍 Expose sur le port 80 (accès navigateur)
    ports:
      - "80:80"

    networks:
      - techshop-network

# =====================================================
# 🌐 RÉSEAU DOCKER INTERNE
# =====================================================
networks:
  techshop-network:
    # Réseau isolé interne Docker
    driver: bridge

# =====================================================
# 💾 VOLUME POUR PERSISTANCE DB
# =====================================================
volumes:
  postgres-data:
